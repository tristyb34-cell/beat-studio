<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beat Studio</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- Top Bar -->
    <header id="top-bar">
      <div class="top-left">
        <span class="logo">Beat Studio</span>
      </div>
      <div class="transport">
        <button id="btn-play" class="transport-btn" title="Play">&#9654;</button>
        <button id="btn-stop" class="transport-btn" title="Stop">&#9632;</button>
        <div class="bpm-control">
          <label>BPM</label>
          <input type="number" id="bpm" value="128" min="60" max="300" step="1">
        </div>
        <div class="time-sig-control">
          <label>Time Sig</label>
          <select id="time-sig">
            <option value="4">4/4</option>
            <option value="3">3/4</option>
            <option value="6">6/8</option>
          </select>
        </div>
        <div class="position-display">
          <span id="position">0:00.0</span>
        </div>
      </div>
      <div class="top-right">
        <button id="btn-export" class="action-btn">Export WAV</button>
        <button id="btn-save" class="action-btn">Save Project</button>
        <button id="btn-load" class="action-btn">Load Project</button>
      </div>
    </header>

    <!-- Main Layout -->
    <div id="main">

      <!-- Sound Browser (Left Panel) -->
      <aside id="sound-browser">
        <div class="browser-header">
          <h3>Sounds</h3>
          <button id="btn-add-sounds" class="small-btn" title="Add sound files">+</button>
          <input type="file" id="file-input" multiple accept="audio/*" style="display:none">
        </div>
        <div id="browser-search">
          <input type="text" id="search-sounds" placeholder="Search sounds...">
        </div>
        <div id="sound-collections">
          <!-- Populated by JS -->
        </div>
      </aside>

      <!-- Arrangement Area -->
      <div id="arrangement-area">

        <!-- Timeline ruler -->
        <div id="timeline-header">
          <div class="track-label-spacer"></div>
          <div id="ruler">
            <!-- Bar numbers drawn by JS -->
          </div>
        </div>

        <!-- Tracks -->
        <div id="tracks-container">
          <!-- Track rows populated by JS -->
        </div>

        <!-- Playhead overlay -->
        <div id="playhead"></div>

        <!-- Add track button -->
        <div id="add-track-row">
          <button id="btn-add-track" class="small-btn">+ Add Track</button>
        </div>
      </div>
    </div>

    <!-- Sound Settings Panel (slides up from bottom) -->
    <div id="sound-settings" class="hidden">
      <div class="settings-header">
        <h3 id="settings-title">Sound Settings</h3>
        <button id="btn-close-settings" class="small-btn">X</button>
      </div>
      <div class="settings-body">
        <div class="setting-group">
          <label>Volume</label>
          <input type="range" id="snd-volume" min="0" max="1" step="0.01" value="1">
          <span id="snd-volume-val">100%</span>
        </div>
        <div class="setting-group">
          <label>Pitch (semitones)</label>
          <input type="range" id="snd-pitch" min="-24" max="24" step="1" value="0">
          <span id="snd-pitch-val">0</span>
        </div>
        <div class="setting-group">
          <label>Pan</label>
          <input type="range" id="snd-pan" min="-1" max="1" step="0.01" value="0">
          <span id="snd-pan-val">C</span>
        </div>
        <div class="setting-group">
          <label>Start Offset (ms)</label>
          <input type="number" id="snd-start" min="0" value="0" step="10">
        </div>
        <div class="setting-group">
          <label>Fade In (ms)</label>
          <input type="number" id="snd-fadein" min="0" value="0" step="10">
        </div>
        <div class="setting-group">
          <label>Fade Out (ms)</label>
          <input type="number" id="snd-fadeout" min="0" value="0" step="10">
        </div>
        <div class="setting-group">
          <label>Reverse</label>
          <input type="checkbox" id="snd-reverse">
        </div>
        <div class="setting-actions">
          <button id="btn-save-sound" class="action-btn">Save Modified Sound</button>
          <button id="btn-duplicate-block" class="action-btn">Duplicate Block</button>
          <button id="btn-delete-block" class="action-btn danger">Delete Block</button>
        </div>
      </div>
    </div>

  </div>

  <script src="js/audio-engine.js"></script>
  <script src="js/arrangement.js"></script>
  <script src="js/sound-browser.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
