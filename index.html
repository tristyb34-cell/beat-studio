<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sqweeky Clean Productions</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00d4aa">
  <link rel="stylesheet" href="css/style.css?v=30">
</head>
<body>
  <div id="app">

    <!-- Utility Bar -->
    <div id="utility-bar">
      <div class="util-left">
        <span class="logo">Sqweeky Clean</span>
        <span class="project-divider">|</span>
        <span id="project-name" class="project-name" contenteditable="true" spellcheck="false" title="Click to rename project">Untitled Project</span>
        <span id="template-badge" class="template-badge" style="display:none"></span>
      </div>
      <div class="util-right">
        <label class="theme-label">Theme</label>
        <select id="theme-select">
          <option value="default">Midnight Teal</option>
          <option value="sunset">Sunset Orange</option>
          <option value="purple-haze">Purple Haze</option>
          <option value="ocean">Ocean Blue</option>
          <option value="rose">Rose Gold</option>
          <option value="forest">Forest Green</option>
          <option value="cyberpunk">Cyberpunk</option>
          <option value="monochrome">Monochrome</option>
          <option value="fire">Fire Red</option>
          <option value="arctic">Arctic Ice</option>
        </select>
        <button id="btn-offline" class="action-btn accent">For Dad, Click Here</button>
      </div>
    </div>

    <!-- Top Bar -->
    <header id="top-bar">
      <div class="top-left"></div>
      <div class="transport">
        <button id="btn-play" class="transport-btn" title="Play (Space)">&#9654;</button>
        <button id="btn-stop" class="transport-btn" title="Stop">&#9632;</button>
        <button id="btn-loop" class="transport-btn" title="Loop">&#8634;</button>
        <div class="bpm-control">
          <label>BPM</label>
          <input type="number" id="bpm" value="128" min="60" max="300" step="1">
        </div>
        <div class="position-display">
          <span id="position">Bar 1</span>
        </div>
        <div class="snap-control">
          <label>Snap</label>
          <select id="snap-select">
            <option value="1">1 Beat</option>
            <option value="0.5">1/2 Beat</option>
            <option value="0.25" selected>1/4 Beat</option>
            <option value="0.125">1/8 Beat</option>
            <option value="0">Off</option>
          </select>
        </div>
      </div>
      <div class="top-right">
        <button id="btn-pattern" class="action-btn accent">Pattern</button>
        <button id="btn-templates" class="action-btn accent">Templates</button>
        <button id="btn-export" class="action-btn">Export WAV</button>
        <button id="btn-save" class="action-btn">Save</button>
        <button id="btn-load" class="action-btn">Load</button>
        <button id="btn-versions" class="action-btn">Versions</button>
        <button id="btn-import-sounds" class="action-btn accent">+ Sounds</button>
        <button id="btn-tutorial" class="action-btn">?</button>
        <input type="file" id="file-input" multiple accept="audio/*" style="display:none">
      </div>
    </header>

    <!-- Main Layout -->
    <div id="main">

      <!-- Sound Browser (Left Panel) -->
      <aside id="sound-browser">
        <div class="browser-header">
          <h3>Sound Library</h3>
          <button id="btn-collapse-browser" class="small-btn" title="Collapse panel">&#9664;</button>
        </div>
        <div id="browser-search">
          <input type="text" id="search-sounds" placeholder="Search sounds...">
        </div>
        <div id="sound-collections">
          <!-- Populated by JS -->
        </div>
      </aside>

      <!-- Sequencer Grid -->
      <div id="sequencer-area">

        <!-- Timeline ruler (sticky top) -->
        <div id="timeline-header">
          <div class="row-label-spacer"></div>
          <div id="ruler-scroll">
            <div id="ruler">
              <!-- Bar/beat markers drawn by JS -->
            </div>
          </div>
        </div>

        <!-- Rows container (scrolls both ways) -->
        <div id="grid-scroll">
          <div id="grid-rows">
            <!-- Sound rows populated by JS -->
          </div>
        </div>

        <!-- Add row button -->
        <div id="add-row-bar">
          <button id="btn-add-row" class="action-btn">+ Add Row</button>
        </div>

        <!-- Playhead (absolute, moves with playback) -->
        <div id="playhead"></div>
      </div>
    </div>

    <!-- Sound Editor Panel (bottom) -->
    <div id="sound-editor" class="hidden">
      <div class="editor-header">
        <h3 id="editor-title">Sound Editor</h3>
        <div class="editor-header-right">
          <button id="btn-preview-editor" class="small-btn" title="Preview">&#9654;</button>
          <button id="btn-save-sound" class="action-btn">Save as WAV</button>
          <button id="btn-close-editor" class="small-btn">&times;</button>
        </div>
      </div>
      <div class="editor-body">
        <div class="editor-section">
          <h4>Tuning</h4>
          <div class="knob-row">
            <div class="knob-group">
              <label>Pitch</label>
              <input type="range" id="ed-pitch" min="-24" max="24" step="1" value="0">
              <span id="ed-pitch-val">0 st</span>
            </div>
            <div class="knob-group">
              <label>Fine Tune</label>
              <input type="range" id="ed-fine" min="-50" max="50" step="1" value="0">
              <span id="ed-fine-val">0 ct</span>
            </div>
          </div>
        </div>
        <div class="editor-section">
          <h4>Level</h4>
          <div class="knob-row">
            <div class="knob-group">
              <label>Volume</label>
              <input type="range" id="ed-volume" min="0" max="1.5" step="0.01" value="1">
              <span id="ed-volume-val">100%</span>
            </div>
            <div class="knob-group">
              <label>Pan</label>
              <input type="range" id="ed-pan" min="-1" max="1" step="0.01" value="0">
              <span id="ed-pan-val">C</span>
            </div>
          </div>
        </div>
        <div class="editor-section">
          <h4>Envelope</h4>
          <div class="knob-row">
            <div class="knob-group">
              <label>Attack</label>
              <input type="range" id="ed-attack" min="0" max="500" step="1" value="0">
              <span id="ed-attack-val">0ms</span>
            </div>
            <div class="knob-group">
              <label>Decay</label>
              <input type="range" id="ed-decay" min="0" max="2000" step="10" value="0">
              <span id="ed-decay-val">0ms</span>
            </div>
          </div>
        </div>
        <div class="editor-section">
          <h4>Filter</h4>
          <div class="knob-row">
            <div class="knob-group">
              <label>Type</label>
              <select id="ed-filter-type">
                <option value="none">None</option>
                <option value="lowpass">Low Pass</option>
                <option value="highpass">High Pass</option>
                <option value="bandpass">Band Pass</option>
              </select>
            </div>
            <div class="knob-group">
              <label>Cutoff</label>
              <input type="range" id="ed-cutoff" min="20" max="20000" step="1" value="20000">
              <span id="ed-cutoff-val">20kHz</span>
            </div>
            <div class="knob-group">
              <label>Resonance</label>
              <input type="range" id="ed-resonance" min="0" max="20" step="0.1" value="0">
              <span id="ed-resonance-val">0</span>
            </div>
          </div>
        </div>
        <div class="editor-section">
          <h4>Effects</h4>
          <div class="knob-row">
            <div class="knob-group">
              <label>Distortion</label>
              <input type="range" id="ed-distortion" min="0" max="100" step="1" value="0">
              <span id="ed-distortion-val">0%</span>
            </div>
            <div class="knob-group">
              <label>Reverse</label>
              <input type="checkbox" id="ed-reverse">
            </div>
            <div class="knob-group">
              <label>Stretch</label>
              <input type="range" id="ed-stretch" min="0.25" max="4" step="0.05" value="1">
              <span id="ed-stretch-val">1.0x</span>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.title = 'JS ERROR: ' + msg;
      var d = document.createElement('div');
      d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;padding:12px;z-index:9999;font:14px monospace;';
      d.textContent = 'ERROR: ' + msg + ' in ' + (src||'?') + ':' + line;
      document.body.appendChild(d);
      console.error('[GLOBAL ERROR]', msg, src, line, col, err);
    };
  </script>
  <script src="js/audio-engine.js?v=30"></script>
  <script src="js/sound-library.js?v=30"></script>
  <script src="js/sequencer.js?v=30"></script>
  <script src="js/sound-editor.js?v=30"></script>
  <script src="js/templates.js?v=30"></script>
  <script src="js/app.js?v=30"></script>
  <script>
    // Register service worker normally (no more nuking on every load)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(function(reg) {
        console.log('[SW] Registered');
        reg.update();
      }).catch(function(err) {
        console.warn('[SW] Registration failed:', err);
      });
    }

    // "For Dad" offline button
    (function() {
      var btn = document.getElementById('btn-offline');
      if (!btn) return;

      // Check if already cached on load
      if ('caches' in window) {
        caches.has('sqweeky-clean-v30').then(function(has) {
          if (has) {
            btn.textContent = 'Saved Offline';
            btn.style.background = '#059669';
          }
        });
      }

      btn.addEventListener('click', function() {
        if (!('serviceWorker' in navigator) || !('caches' in window)) {
          alert('Your browser does not support offline mode. Try Chrome or Edge.');
          return;
        }

        btn.textContent = 'Saving...';
        btn.disabled = true;

        // Force SW to install and cache everything
        navigator.serviceWorker.register('./sw.js').then(function(reg) {
          return reg.update();
        }).then(function() {
          // Also manually cache all assets to be safe
          return caches.open('sqweeky-clean-v30');
        }).then(function(cache) {
          return cache.addAll([
            './',
            './index.html',
            './css/style.css?v=30',
            './js/audio-engine.js?v=30',
            './js/sound-library.js?v=30',
            './js/sequencer.js?v=30',
            './js/sound-editor.js?v=30',
            './js/templates.js?v=30',
            './js/app.js?v=30',
            './favicon.svg',
            './manifest.json'
          ]);
        }).then(function() {
          btn.textContent = 'Saved Offline';
          btn.style.background = '#059669';
          btn.disabled = false;

          // Show success modal
          var bd = document.createElement('div');
          bd.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:499;';
          var m = document.createElement('div');
          m.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1a1a2e;border:1px solid #3a3a5c;border-radius:12px;padding:32px;z-index:500;width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.6);text-align:center;';
          m.innerHTML = '<h2 style="color:#00d4aa;margin:0 0 16px;font-size:18px;">All Saved for Offline!</h2>'
            + '<p style="color:#e0e0f0;font-size:14px;line-height:1.6;margin:0 0 12px;">Hey Dad! The beat studio is now saved on this device. You can:</p>'
            + '<ul style="color:#c0c0d0;font-size:13px;text-align:left;line-height:1.8;margin:0 0 16px;padding-left:20px;">'
            + '<li>Close the browser and come back later</li>'
            + '<li>Use it without internet</li>'
            + '<li>Bookmark this page for easy access</li>'
            + '<li>On Chrome/Edge: click the install icon in the address bar to add it to your desktop like a real app</li>'
            + '</ul>'
            + '<p style="color:#a0a0b0;font-size:12px;margin:0 0 20px;">Your projects save automatically to this browser. Just don\'t clear your browser data.</p>';
          var cb = document.createElement('button');
          cb.textContent = 'Got it!';
          cb.className = 'action-btn accent';
          cb.style.cssText = 'font-size:14px;padding:10px 32px;';
          cb.onclick = function() { m.remove(); bd.remove(); };
          m.appendChild(cb);
          bd.onclick = function() { m.remove(); bd.remove(); };
          document.body.appendChild(bd);
          document.body.appendChild(m);
        }).catch(function(err) {
          console.error('[OFFLINE] Error:', err);
          btn.textContent = 'For Dad, Click Here';
          btn.disabled = false;
          alert('Could not save for offline. Make sure you are connected to the internet for the first save.');
        });
      });
    })();

    // Theme switcher
    (function() {
      var sel = document.getElementById('theme-select');
      if (!sel) return;
      var saved = localStorage.getItem('sqweeky_theme') || 'default';
      if (saved !== 'default') {
        document.documentElement.setAttribute('data-theme', saved);
        sel.value = saved;
      }
      sel.addEventListener('change', function() {
        var theme = sel.value;
        if (theme === 'default') {
          document.documentElement.removeAttribute('data-theme');
        } else {
          document.documentElement.setAttribute('data-theme', theme);
        }
        localStorage.setItem('sqweeky_theme', theme);
      });
    })();
  </script>
</body>
</html>
